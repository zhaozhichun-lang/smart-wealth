name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint → TypeCheck → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # 假环境变量，仅用于 build 阶段（不会连接真实数据库）
      DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      JWT_SECRET: test_secret_at_least_16_chars
      JWT_ALGORITHM: HS256
      TOKEN_EXPIRES_IN: 300m
      DEEPSEEK_API_KEY: sk-test-placeholder
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-flash
      DEEPSEEK_SYSTEM_PROMPT: You are a helpful assistant.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
