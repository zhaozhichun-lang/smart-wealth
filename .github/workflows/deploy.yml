name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e JWT_ALGORITHM="HS256" \
            -e TOKEN_EXPIRES_IN="300m" \
            -e DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            -e DEEPSEEK_BASE_URL="${{ secrets.DEEPSEEK_BASE_URL }}" \
            -e DEEPSEEK_MODEL="${{ secrets.DEEPSEEK_MODEL }}" \
            -e "DEEPSEEK_SYSTEM_PROMPT=${{ secrets.DEEPSEEK_SYSTEM_PROMPT }}"
